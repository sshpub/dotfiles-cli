version: 2

project_name: dotfiles

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - "386"
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: freebsd
        goarch: arm64
      - goos: freebsd
        goarch: "386"
    ldflags:
      - -s -w -X github.com/sshpub/dotfiles-cli/cmd.Version={{.Version}}
    binary: dotfiles

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: sshpub
    name: dotfiles-cli
